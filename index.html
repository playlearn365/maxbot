<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>麥斯小天使</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Nunito', 'Noto Sans TC', sans-serif;
  min-height: 100vh;
  background: linear-gradient(180deg, #87CEEB 0%, #c9e8f7 55%, #a8dba8 100%);
  display: flex; flex-direction: column; align-items: center;
  overflow-x: hidden;
}
.cloud { position:fixed; background:#fff; border-radius:50px; opacity:.85; animation: fc linear infinite; pointer-events:none; z-index:0; }
.cloud::before,.cloud::after { content:''; position:absolute; background:#fff; border-radius:50%; }
.c1{width:120px;height:40px;top:7%;left:-130px;animation-duration:22s;}
.c1::before{width:60px;height:60px;top:-30px;left:15px;} .c1::after{width:40px;height:40px;top:-20px;left:55px;}
.c2{width:90px;height:30px;top:19%;left:-100px;animation-duration:30s;animation-delay:-12s;}
.c2::before{width:45px;height:45px;top:-22px;left:10px;} .c2::after{width:30px;height:30px;top:-15px;left:40px;}
@keyframes fc { from{transform:translateX(0)} to{transform:translateX(calc(100vw + 200px))} }
.sun { position:fixed; top:16px; right:24px; width:64px; height:64px; background:#FFD93D; border-radius:50%; box-shadow:0 0 0 8px rgba(255,217,61,.3),0 0 0 16px rgba(255,217,61,.15); animation:sunp 3s ease-in-out infinite; pointer-events:none; z-index:0; }
@keyframes sunp { 0%,100%{box-shadow:0 0 0 8px rgba(255,217,61,.3),0 0 0 16px rgba(255,217,61,.15)} 50%{box-shadow:0 0 0 14px rgba(255,217,61,.4),0 0 0 28px rgba(255,217,61,.2)} }
.flowers { position:fixed; bottom:52px; width:100%; text-align:center; font-size:1.4rem; letter-spacing:16px; pointer-events:none; z-index:2; }
.ground  { position:fixed; bottom:0; width:100%; height:52px; background:#6BCB77; border-top:5px solid #5aaa66; z-index:1; }

.screen {
  position:fixed; inset:0; z-index:100;
  display:flex; align-items:center; justify-content:center;
  background:linear-gradient(180deg,#87CEEB 0%,#c9e8f7 55%,#a8dba8 100%);
}
.card {
  background:#fff; border-radius:28px; padding:28px;
  max-width:400px; width:92%; text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.18);
  animation:popIn .5s ease;
  max-height:90vh; overflow-y:auto;
}
@keyframes popIn { 0%{transform:scale(.85);opacity:0} 70%{transform:scale(1.03)} 100%{transform:scale(1);opacity:1} }
.card-icon  { font-size:2.5rem; margin-bottom:8px; }
.card-title { font-size:1.5rem; font-weight:900; color:#2D2D2D; margin-bottom:12px; }
.field-label { font-size:.85rem; font-weight:800; color:#555; text-align:left; margin-bottom:5px; margin-top:10px; }
.field-input {
  width:100%; padding:12px 16px; font-size:1rem; font-weight:700;
  font-family:inherit; border:3px solid #e0e0e0; border-radius:14px;
  outline:none; transition:border-color .2s; margin-bottom:10px; color:#333;
}
.field-input:focus { border-color:#4D96FF; }

.img-upload-area {
  border:3px dashed #BFDBFE; border-radius:16px; padding:12px;
  margin-bottom:14px; cursor:pointer; background:#F0F7FF;
}
.img-preview { width:80px; height:80px; border-radius:50%; object-fit:cover; border:3px solid #4D96FF; }

.primary-btn {
  width:100%; padding:15px; font-size:1.15rem; font-weight:900;
  font-family:inherit; border:none; border-radius:50px; cursor:pointer;
  background:linear-gradient(135deg,#4D96FF,#2563EB); color:#fff;
  box-shadow:0 6px 0 rgba(37,99,235,.35); transition:all .15s; margin-top:10px;
}
.primary-btn:active { transform:translateY(3px); box-shadow:0 3px 0 rgba(37,99,235,.35); }
.primary-btn:disabled { background:#ccc; box-shadow:none; cursor:not-allowed; }

#app { display:none; width:100%; }
.wrap { width:100%; max-width:640px; margin:0 auto; padding:16px 16px 120px; display:flex; flex-direction:column; align-items:center; gap:14px; z-index:10; position:relative; }
.title { font-size:2rem; font-weight:900; color:#fff; text-shadow:2px 2px 0 rgba(0,0,0,.15); text-align:center; }

.bubble {
  background:#fff; border-radius:22px; padding:16px 20px;
  max-width:500px; width:100%; min-height:76px;
  display:flex; align-items:center; justify-content:center;
  border:3px solid #4D96FF; position:relative;
  box-shadow:0 6px 20px rgba(0,0,0,.1);
}
.bubble.mic-on { border-color:#FF4757; animation:bp .8s ease-in-out infinite alternate; }
@keyframes bp { from{box-shadow:0 6px 20px rgba(255,71,87,.2)} to{box-shadow:0 6px 30px rgba(255,71,87,.5)} }
.bubble-text { font-size:1.2rem; font-weight:700; color:#2D2D2D; text-align:center; line-height:1.5; }

.mic-btn {
  width:110px; height:110px; border-radius:50%; border:none; cursor:pointer;
  background:linear-gradient(135deg,#FF6B9D,#FF4757); font-size:3rem;
  box-shadow:0 8px 0 rgba(255,71,87,.4);
  transition:all .15s; display:flex; align-items:center; justify-content:center;
  -webkit-tap-highlight-color:transparent;
}
.mic-btn.on { background:linear-gradient(135deg,#FF4757,#c0392b); transform:scale(.95); animation:mp .6s ease-in-out infinite alternate; }
@keyframes mp { from{box-shadow:0 0 0 0 rgba(255,71,87,.5)} to{box-shadow:0 0 0 20px rgba(255,71,87,0)} }

.transcript { background:rgba(255,255,255,.87); border-radius:16px; padding:10px 16px; width:100%; font-size:1.1rem; font-weight:700; color:#888; text-align:center; border:2px dashed #ccc; }
.transcript.has { border:2px solid #4D96FF; color:#2D2D2D; }

.qbtn { background:#fff; border:3px solid #FF9A3C; border-radius:50px; padding:8px 14px; font-size:1rem; font-weight:800; color:#FF9A3C; cursor:pointer; }

#errorBox {
  position:fixed; bottom:80px; left:50%; transform:translateX(-50%);
  background:#FF4757; color:white; padding:12px 24px; border-radius:50px;
  font-weight:bold; display:none; z-index:1000;
}
.change-key {
  position:fixed; top:10px; left:10px; padding:6px 12px; background:rgba(255,255,255,0.7);
  border-radius:20px; font-size:0.8rem; font-weight:bold; color:#4D96FF; cursor:pointer; z-index:10; border:1px solid #4D96FF;
}
</style>
</head>
<body>

<div class="sun"></div>
<div class="cloud c1"></div><div class="cloud c2"></div><div class="cloud c3"></div>
<div class="flowers">🌸🌻🌷🌼🌸🌻🌷</div>
<div class="ground"></div>

<div id="errorBox"></div>

<!-- 設定畫面 -->
<div class="screen" id="setupScreen">
  <div class="card">
    <div class="card-icon">👼</div>
    <div class="card-title">機器人小助手設定</div>
    
    <div class="field-label">1. 輸入 Gemini API Key</div>
    <input class="field-input" id="apiKeyInput" type="password" placeholder="AIza..." oninput="checkForm()"/>
    
    <div class="field-label">2. 機器人名字</div>
    <input class="field-input" id="botNameInput" type="text" placeholder="麥斯小天使" maxlength="10"/>

    <div class="field-label">3. 機器人頭像 (可選)</div>
    <div class="img-upload-area" onclick="document.getElementById('imgFileInput').click()">
      <img id="imgPreview" class="img-preview" style="display:none;" src=""/>
      <div id="imgPlaceholder">🤖 點此上傳圖片</div>
    </div>
    <input type="file" id="imgFileInput" accept="image/*" style="none" onchange="onImgChange(event)" style="display:none;"/>

    <button class="primary-btn" id="startBtn" onclick="startApp()" disabled>設定完成，開始遊戲！</button>
    <div style="font-size:0.75rem; color:#aaa; margin-top:15px;">安卓手機請務必使用 HTTPS 連線</div>
  </div>
</div>

<!-- 主程式 -->
<div id="app">
  <div class="change-key" onclick="showSetup()">⚙️ 設定</div>
  <div class="wrap">
    <div class="title" id="appTitle">👼 麥斯小天使</div>
    
    <div class="robot-wrap">
      <svg id="robotSvg" width="100" height="100" viewBox="0 0 140 140">
        <rect x="28" y="20" width="84" height="62" rx="18" fill="#4D96FF"/>
        <rect x="38" y="30" width="64" height="44" rx="12" fill="#E8F4FF"/>
        <circle id="eL" cx="57" cy="50" r="6" fill="#2563EB"/><circle id="eR" cx="83" cy="50" r="6" fill="#2563EB"/>
        <path id="mouth" d="M54 66 Q70 76 86 66" stroke="#2563EB" stroke-width="3" fill="none"/>
      </svg>
      <img id="robotImg" style="width:100px;height:100px;border-radius:50%;display:none;object-fit:cover;border:3px solid white;"/>
    </div>

    <div class="bubble" id="bubble">
      <div class="bubble-text" id="btext">你好！點麥克風跟我說話吧！</div>
    </div>

    <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
    <div style="font-weight:900;color:white;text-shadow:1px 1px 2px rgba(0,0,0,0.2)">點我說話</div>

    <div class="transcript" id="transcript">聽到內容會顯示在此...</div>

    <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:10px;">
      <button class="qbtn" onclick="askQ('為什麼天空是藍色的？')">🌈 天空為什麼藍？</button>
      <button class="qbtn" onclick="askQ('魚為什麼住在水裡？')">🐟 魚為什麼住水裡？</button>
      <button class="qbtn" onclick="askQ('為什麼要睡覺？')">😴 為什麼要睡覺？</button>
    </div>
  </div>
</div>

<script>
let apiKey = '';
let botName = '麥斯小天使';
let botImageData = null;
let recognition = null;
let isListening = false;
let audioCtx = null;

// 初始化檢查
window.onload = () => {
  const savedKey = localStorage.getItem('maxbot_key');
  const savedName = localStorage.getItem('maxbot_name');
  const savedImg = localStorage.getItem('maxbot_img');

  if (savedKey) {
    document.getElementById('apiKeyInput').value = savedKey;
    apiKey = savedKey;
  }
  if (savedName) {
    document.getElementById('botNameInput').value = savedName;
    botName = savedName;
  }
  if (savedImg) {
    botImageData = savedImg;
    const preview = document.getElementById('imgPreview');
    preview.src = botImageData;
    preview.style.display = 'block';
    document.getElementById('imgPlaceholder').style.display = 'none';
  }
  checkForm();
};

function checkForm() {
  const key = document.getElementById('apiKeyInput').value.trim();
  document.getElementById('startBtn').disabled = key.length < 10;
}

function onImgChange(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    botImageData = ev.target.result;
    document.getElementById('imgPreview').src = botImageData;
    document.getElementById('imgPreview').style.display = 'block';
    document.getElementById('imgPlaceholder').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

function startApp() {
  apiKey = document.getElementById('apiKeyInput').value.trim();
  botName = document.getElementById('botNameInput').value.trim() || "麥斯小天使";
  
  localStorage.setItem('maxbot_key', apiKey);
  localStorage.setItem('maxbot_name', botName);
  if (botImageData) localStorage.setItem('maxbot_img', botImageData);

  document.getElementById('appTitle').textContent = "👼 " + botName;
  if (botImageData) {
    document.getElementById('robotImg').src = botImageData;
    document.getElementById('robotImg').style.display = 'block';
    document.getElementById('robotSvg').style.display = 'none';
  } else {
    document.getElementById('robotImg').style.display = 'none';
    document.getElementById('robotSvg').style.display = 'block';
  }

  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

function showSetup() {
  document.getElementById('setupScreen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

// 語音辨識
function initRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    showError("不支援語音，請換 Chrome 瀏覽器。");
    return null;
  }
  const rec = new SpeechRecognition();
  rec.lang = 'zh-TW';
  rec.onstart = () => { isListening = true; updateMicUI(true); face('listen'); };
  rec.onresult = (e) => {
    let res = '';
    for (let i = e.resultIndex; i < e.results.length; i++) res += e.results[i][0].transcript;
    setTranscript("🗣 「" + res + "」", true);
    if (e.results[0].isFinal) askQ(res);
  };
  rec.onerror = (e) => { isListening = false; updateMicUI(false); };
  rec.onend = () => { isListening = false; updateMicUI(false); };
  return rec;
}

function toggleMic() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (isListening) { recognition.stop(); return; }
  if (!recognition) recognition = initRecognition();
  if (recognition) recognition.start();
}

async function askQ(q) {
  if (!q.trim()) return;
  face('think');
  document.getElementById('btext').textContent = "讓我想想... 🤔";
  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system_instruction: { parts: [{ text: `你是幼兒園老師「${botName}」，語氣溫柔有趣，回答不超過三句話。不要疊字。` }] },
        contents: [{ role: 'user', parts: [{ text: q }] }]
      })
    });
    const data = await res.json();
    const ans = data.candidates?.[0]?.content?.parts?.[0]?.text || "我沒聽清楚，可以再說一次嗎？";
    document.getElementById('btext').textContent = ans;
    face('happy');
    speak(ans);
  } catch (e) { showError("金鑰可能錯誤或網路問題。"); face('normal'); }
}

// PCM 轉 WAV 輔助函式 (修正安卓不支援原始 PCM 播放問題)
function pcmToWav(pcmData, sampleRate) {
  const numChannels = 1, bitsPerSample = 16, dataSize = pcmData.length * 2;
  const buffer = new ArrayBuffer(44 + dataSize), view = new DataView(buffer);
  const writeString = (o, s) => { for (let i = 0; i < s.length; i++) view.setUint8(o + i, s.charCodeAt(i)); };
  writeString(0, 'RIFF'); view.setUint32(4, 36 + dataSize, true); writeString(8, 'WAVE'); writeString(12, 'fmt ');
  view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, numChannels, true);
  view.setUint32(24, sampleRate, true); view.setUint32(28, sampleRate * 2, true);
  view.setUint16(32, 2, true); view.setUint16(34, bitsPerSample, true);
  writeString(36, 'data'); view.setUint32(40, dataSize, true);
  for (let i = 0; i < pcmData.length; i++) view.setInt16(44 + i * 2, pcmData[i], true);
  return new Blob([view], { type: 'audio/wav' });
}

async function speak(text) {
  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: text }] }],
        generationConfig: { 
            responseModalities: ["AUDIO"], 
            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Aoede" } } } 
        }
      })
    });
    const data = await res.json();
    const audioData = data.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
    const mimeType = data.candidates?.[0]?.content?.parts?.[0]?.inlineData?.mimeType || "";
    
    if (audioData) {
      const sampleRate = parseInt(mimeType.match(/rate=(\d+)/)?.[1] || "24000", 10);
      const binary = atob(audioData);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      const pcm16 = new Int16Array(bytes.buffer);
      const wavBlob = pcmToWav(pcm16, sampleRate);
      const url = URL.createObjectURL(wavBlob);
      
      if (audioCtx) {
        if (audioCtx.state === 'suspended') await audioCtx.resume();
        const arrayBuf = await wavBlob.arrayBuffer();
        const decoded = await audioCtx.decodeAudioData(arrayBuf);
        const src = audioCtx.createBufferSource();
        src.buffer = decoded; src.connect(audioCtx.destination); src.start(0);
        src.onended = () => URL.revokeObjectURL(url);
      } else {
        const audio = new Audio(url);
        audio.onended = () => URL.revokeObjectURL(url);
        await audio.play();
      }
      return;
    }
  } catch(e) { console.warn("TTS 失敗:", e); }
  
  // Fallback (SpeechSynthesis)
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-TW';
  speechSynthesis.speak(u);
}

function updateMicUI(on) {
  document.getElementById('micBtn').classList.toggle('on', on);
  document.getElementById('bubble').classList.toggle('mic-on', on);
}
function setTranscript(t, has) {
  const el = document.getElementById('transcript');
  el.textContent = t; el.className = 'transcript' + (has ? ' has' : '');
}
function showError(msg) {
  const box = document.getElementById('errorBox');
  box.textContent = msg; box.style.display = 'block';
  setTimeout(() => box.style.display = 'none', 4000);
}
function face(mood) {
  const m=document.getElementById('mouth'),eL=document.getElementById('eL'),eR=document.getElementById('eR');
  if (mood === 'happy') m.setAttribute('d', 'M50 64 Q70 80 90 64');
  else if (mood === 'think') m.setAttribute('d', 'M56 68 Q70 70 84 68');
  else if (mood === 'listen') m.setAttribute('d', 'M56 68 Q70 74 84 68');
  else m.setAttribute('d', 'M54 66 Q70 76 86 66');
}
</script>
</body>
</html>
